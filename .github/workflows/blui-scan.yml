
name: CI-BlackDuck-SCA-Basic

on:
  push:
    branches: [main, master, dev, feature/*]
    paths:
      - 'apps/design-patterns/**'
      - 'apps/demo/**'
      - 'apps/showcase/**'
      - 'apps/storybook/**'
      - 'apps/themeShowcase/**'
      - 'apps/workflow/example-vite/**'
      - 'apps/workflow/example/**'
      - 'packages/cli-templates/**'
      - 'packages/component-library/**'
      - 'packages/login-workflow/**'
      - 'packages/themes/**'
  pull_request:
    branches: [main, master, dev]
    paths:
      - 'apps/design-patterns/**'
      - 'apps/demo/**'
      - 'apps/showcase/**'
      - 'apps/storybook/**'
      - 'apps/themeShowcase/**'
      - 'apps/workflow/example-vite/**'
      - 'apps/workflow/example/**'
      - 'packages/cli-templates/**'
      - 'packages/component-library/**'
      - 'packages/login-workflow/**'
      - 'packages/themes/**'
  workflow_dispatch:

jobs:
  blackduck-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    strategy:
      matrix:
        app:
          - apps/design-patterns
          - apps/demo
          - apps/showcase
          - apps/storybook
          - apps/themeShowcase
          - apps/workflow/example-vite
          - apps/workflow/example
          - packages/cli-templates
          - packages/component-library
          - packages/login-workflow
          - packages/themes

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in app directory
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^${{ matrix.app }}/"; then
              echo "changes=true" >> $GITHUB_OUTPUT
            else
              echo "changes=false" >> $GITHUB_OUTPUT
            fi
          fi
      - name: Black Duck Scan
        if: steps.check_changes.outputs.changes == 'true'
        uses: blackduck-inc/black-duck-security-scan@v2.3.0
        env:
          DETECT_PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          DETECT_PROJECT_VERSION_NAME: react-${{ matrix.app }}
        with:
          blackducksca_url: ${{ vars.BLACKDUCKSCA_URL }}
          blackducksca_token: ${{ secrets.BLACKDUCKSCA_TOKEN }}
          # Fail the build if new CRITICAL or HIGH vulnerabilities are introduced
          blackducksca_scan_failure_severities: 'CRITICAL,HIGH'
          # Compare against baseline and fail only on NEW vulnerabilities
          blackducksca_scan_full: true
          # Generate SARIF report for GitHub Security tab
          blackducksca_reports_sarif_create: true
          blackducksca_reports_sarif_file_path: 'blackduck-sarif.json'
          blackducksca_reports_sarif_severities: 'CRITICAL,HIGH,MEDIUM'
          # Enable PR comments with vulnerability details
          blackducksca_prComment_enabled: true
          # Create fix PRs for vulnerabilities (optional)
          blackducksca_fixpr_enabled: false

      - name: Display Critical and High Vulnerabilities
        if: always() && steps.check_changes.outputs.changes == 'true'
        run: |
          echo "=========================================="
          echo "Security Scan Results for ${{ matrix.app }}"
          echo "=========================================="
          
          if [ -f "blackduck-sarif.json" ]; then
            echo ""
            echo "📊 Analyzing SARIF report for CRITICAL and HIGH vulnerabilities..."
            echo ""
            
            # Extract and display CRITICAL vulnerabilities
            CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' blackduck-sarif.json 2>/dev/null || echo "0")
            HIGH_COUNT=$(jq '[.runs[].results[] | select(.level == "warning")] | length' blackduck-sarif.json 2>/dev/null || echo "0")
            
            echo "🔴 CRITICAL Vulnerabilities: $CRITICAL_COUNT"
            echo "🟠 HIGH Vulnerabilities: $HIGH_COUNT"
            echo ""
            
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🔴 CRITICAL VULNERABILITIES:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              jq -r '.runs[].results[] | select(.level == "error") | "
              CVE: \(.ruleId // "N/A")
              Message: \(.message.text)
              Component: \(.locations[0].physicalLocation.artifactLocation.uri // "N/A")
              ────────────────────────────────────────
              "' blackduck-sarif.json 2>/dev/null || echo "Error parsing CRITICAL vulnerabilities"
            fi
            
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🟠 HIGH VULNERABILITIES:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              jq -r '.runs[].results[] | select(.level == "warning") | "
              CVE: \(.ruleId // "N/A")
              Message: \(.message.text)
              Component: \(.locations[0].physicalLocation.artifactLocation.uri // "N/A")
              ────────────────────────────────────────
              "' blackduck-sarif.json 2>/dev/null || echo "Error parsing HIGH vulnerabilities"
            fi
            
            if [ "$CRITICAL_COUNT" -eq 0 ] && [ "$HIGH_COUNT" -eq 0 ]; then
              echo "✅ No CRITICAL or HIGH vulnerabilities found!"
            fi
          else
            echo "⚠️  SARIF report not found. Black Duck scan may have failed or not generated output."
            echo "Check the Black Duck Scan step for errors."
          fi
          
          echo ""
          echo "=========================================="
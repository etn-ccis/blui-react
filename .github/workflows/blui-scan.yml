
name: CI-BlackDuck-SCA-Basic

on:
  push:
    branches: [main, master, dev, feature/*]
    paths:
      - 'apps/design-patterns/**'
      - 'apps/demo/**'
      - 'apps/showcase/**'
      - 'apps/storybook/**'
      - 'apps/themeShowcase/**'
      - 'apps/workflow/example-vite/**'
      - 'apps/workflow/example/**'
      - 'packages/cli-templates/**'
      - 'packages/component-library/**'
      - 'packages/login-workflow/**'
      - 'packages/themes/**'
  pull_request:
    branches: [main, master, dev]
    paths:
      - 'apps/design-patterns/**'
      - 'apps/demo/**'
      - 'apps/showcase/**'
      - 'apps/storybook/**'
      - 'apps/themeShowcase/**'
      - 'apps/workflow/example-vite/**'
      - 'apps/workflow/example/**'
      - 'packages/cli-templates/**'
      - 'packages/component-library/**'
      - 'packages/login-workflow/**'
      - 'packages/themes/**'
  workflow_dispatch:

jobs:
  blackduck-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    strategy:
      matrix:
        app:
          - apps/design-patterns
          - apps/demo
          - apps/showcase
          - apps/storybook
          - apps/themeShowcase
          - apps/workflow/example-vite
          - apps/workflow/example
          - packages/cli-templates
          - packages/component-library
          - packages/login-workflow
          - packages/themes

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in app directory
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q "^${{ matrix.app }}/"; then
              echo "changes=true" >> $GITHUB_OUTPUT
            else
              echo "changes=false" >> $GITHUB_OUTPUT
            fi
          fi
      - name: Black Duck Scan
        id: blackduck_scan
        if: steps.check_changes.outputs.changes == 'true'
        continue-on-error: true
        uses: blackduck-inc/black-duck-security-scan@v2.3.0
        env:
          DETECT_PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          DETECT_PROJECT_VERSION_NAME: react-${{ matrix.app }}
        with:
          blackducksca_url: ${{ vars.BLACKDUCKSCA_URL }}
          blackducksca_token: ${{ secrets.BLACKDUCKSCA_TOKEN }}
          # Fail the build if new CRITICAL or HIGH vulnerabilities are introduced
          blackducksca_scan_failure_severities: 'CRITICAL,HIGH'
          # Compare against baseline and fail only on NEW vulnerabilities
          blackducksca_scan_full: true
          # Keep analysis synchronous so policy gates and PR comments are available in this run
          blackducksca_waitForScan: true
          # Generate SARIF report for GitHub Security tab
          blackducksca_reports_sarif_create: true
          blackducksca_reports_sarif_file_path: '${{ github.workspace }}/${{ matrix.app }}/blackduck-sarif.json'
          blackducksca_reports_sarif_severities: 'CRITICAL,HIGH,MEDIUM'
          # Enable PR comments with vulnerability details
          blackducksca_prComment_enabled: true
          # Create fix PRs for vulnerabilities (optional)
          blackducksca_fixpr_enabled: false

      - name: Debug - List files to find SARIF
        if: steps.check_changes.outputs.changes == 'true' && github.event_name != 'pull_request'
        run: |
          echo "=== Current working directory ==="
          pwd
          echo ""
          echo "=== Files in current directory ==="
          ls -la
          echo ""
          echo "=== Searching for SARIF files ==="
          find ${{ github.workspace }}/${{ matrix.app }} -name "*.json" -type f 2>/dev/null || echo "No JSON files found"
          echo ""
          echo "=== Searching entire workspace ==="
          find ${{ github.workspace }}/${{ matrix.app }} -name "*sarif*" -type f 2>/dev/null || echo "No SARIF files found"

      - name: PR context result handling
        if: always() && steps.check_changes.outputs.changes == 'true' && github.event_name == 'pull_request'
        run: |
          echo "=========================================="
          echo "Security Scan Results for ${{ matrix.app }} (PR context)"
          echo "=========================================="
          echo "Black Duck action does not generate SARIF for pull_request events."
          echo "Use Black Duck PR comments and scan policy gate as result source."
          echo ""
          echo "Black Duck scan outcome: ${{ steps.blackduck_scan.outcome }}"
          echo ""
          if [ "${{ steps.blackduck_scan.outcome }}" = "failure" ]; then
            echo "FAILURE: Black Duck scan step failed"
            exit 1
          fi
          echo "SUCCESS: Black Duck scan completed"

      - name: Display Critical and High Vulnerabilities
        if: always() && steps.check_changes.outputs.changes == 'true' && github.event_name != 'pull_request'
        run: |
          echo "=========================================="
          echo "Security Scan Results for ${{ matrix.app }}"
          echo "=========================================="
          
          # Try to find SARIF file in multiple locations
          SARIF_FILE=""
          if [ -f "blackduck-sarif.json" ]; then
            SARIF_FILE="blackduck-sarif.json"
          elif [ -f "${{ github.workspace }}/${{ matrix.app }}/blackduck-sarif.json" ]; then
            SARIF_FILE="${{ github.workspace }}/${{ matrix.app }}/blackduck-sarif.json"
          elif [ -f "${{ github.workspace }}/blackduck-sarif.json" ]; then
            SARIF_FILE="${{ github.workspace }}/blackduck-sarif.json"
          fi
          
          if [ -n "$SARIF_FILE" ] && [ -f "$SARIF_FILE" ]; then
            echo ""
            echo "📊 Analyzing SARIF report: $SARIF_FILE"
            echo ""
            
            # Extract and display CRITICAL vulnerabilities
            CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
            HIGH_COUNT=$(jq '[.runs[].results[] | select(.level == "warning")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
            
            echo "🔴 CRITICAL Vulnerabilities: $CRITICAL_COUNT"
            echo "🟠 HIGH Vulnerabilities: $HIGH_COUNT"
            echo ""
            
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🔴 CRITICAL VULNERABILITIES:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              jq -r '.runs[].results[] | select(.level == "error") | "
              CVE: \(.ruleId // "N/A")
              Message: \(.message.text)
              Component: \(.locations[0].physicalLocation.artifactLocation.uri // "N/A")
              ────────────────────────────────────────
              "' "$SARIF_FILE" 2>/dev/null || echo "Error parsing CRITICAL vulnerabilities"
            fi
            
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🟠 HIGH VULNERABILITIES:"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              jq -r '.runs[].results[] | select(.level == "warning") | "
              CVE: \(.ruleId // "N/A")
              Message: \(.message.text)
              Component: \(.locations[0].physicalLocation.artifactLocation.uri // "N/A")
              ────────────────────────────────────────
              "' "$SARIF_FILE" 2>/dev/null || echo "Error parsing HIGH vulnerabilities"
            fi
            
            echo ""
            echo "=========================================="
            
            # Fail the job if CRITICAL or HIGH vulnerabilities found OR if Black Duck scan failed
            if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
              echo "FAILURE: Found $CRITICAL_COUNT CRITICAL and $HIGH_COUNT HIGH vulnerabilities"
              exit 1
            elif [ "${{ steps.blackduck_scan.outcome }}" == "failure" ]; then
              echo "FAILURE: Black Duck scan step failed"
              exit 1
            else
              echo "SUCCESS: No CRITICAL or HIGH vulnerabilities found"
            fi
          else
            echo "ERROR: SARIF report not found in any expected location"
            echo "Black Duck scan may have failed or not generated output."
            echo "Checked locations:"
            echo "  - blackduck-sarif.json"
            echo "  - ${{ github.workspace }}/${{ matrix.app }}/blackduck-sarif.json"
            echo "  - ${{ github.workspace }}/blackduck-sarif.json"
            echo ""
            echo "Black Duck scan outcome: ${{ steps.blackduck_scan.outcome }}"
            echo ""
            echo "=========================================="
            exit 1
          fi